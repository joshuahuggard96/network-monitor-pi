<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Network Monitor</h1>

        <!-- Network Status -->
        <section>
            <h2>Network Status</h2>
            <div id="status-container"><div class="status loading">Loading&hellip;</div></div>
        </section>

        <!-- Add Device -->
        <section>
            <h2>Devices</h2>
            <div class="panel">
                <input id="dev-name" type="text" placeholder="Device name" />
                <input id="dev-ip"   type="text" placeholder="IP address" />
                <button onclick="addDevice()">Add</button>
                <span id="dev-result"></span>
            </div>
        </section>

        <!-- MFW Status -->
        <section>
            <h2>MFW System</h2>
            <div id="mfw-status"><div class="status loading">Loading&hellip;</div></div>
        </section>

        <!-- Send Test Page -->
        <section>
            <h2>Send Test Page</h2>
            <div class="panel">
                <input id="page-msg" type="text" placeholder="Message (e.g. Router Offline)" />
                <button onclick="sendPage()">Send to MFW</button>
                <span id="page-result"></span>
            </div>
        </section>

        <!-- MFW Alarm Log -->
        <section>
            <h2>MFW Alarm Log</h2>
            <iframe id="mfw-log" src="/api/mfw-log" title="MFW Log"></iframe>
        </section>
    </div>

    <script>
        function updateNetwork(data) {
            const relay = `<div class="status ${data.output_status ? 'online' : 'offline'}">Relay: ${data.output_status ? 'ON' : 'OFF'}</div>`;
            const rows = Object.entries(data.device_list).map(([name, d]) => {
                const cls   = d.status === true ? 'ip-online' : d.status === false ? 'ip-offline' : 'ip-checking';
                const label = d.status === true ? 'Online'    : d.status === false ? 'Offline'    : 'Checking';
                const last  = d.last_online ? `<span class="last-online">Last online: ${d.last_online}</span>` : '';
                return `<div class="ip-item ${cls}">
                    <strong>${name}</strong>
                    <span class="status-indicator">${label}</span>
                    ${last}
                    <button class="remove-btn" onclick="removeDevice('${name}')">&#x2715;</button>
                </div>`;
            }).join('');
            document.getElementById('status-container').innerHTML = relay + '<div id="ip-list">' + rows + '</div>';
        }

        function updateMfw(data) {
            document.getElementById('mfw-status').innerHTML = data.mfra_running
                ? '<div class="status online">MFRA Running</div>'
                : '<div class="status offline">MFRA Stopped</div>';
        }

        function addDevice() {
            const name = document.getElementById('dev-name').value.trim();
            const ip   = document.getElementById('dev-ip').value.trim();
            if (!name || !ip) return;
            fetch('/api/devices', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, ip})})
                .then(r => r.json())
                .then(d => {
                    document.getElementById('dev-name').value = '';
                    document.getElementById('dev-ip').value   = '';
                    const el = document.getElementById('dev-result');
                    el.textContent = d.error ? d.error : `Added: ${d.added}`;
                    setTimeout(() => el.textContent = '', 3000);
                });
        }

        function removeDevice(name) {
            fetch('/api/devices/' + encodeURIComponent(name), {method:'DELETE'})
                .then(r => r.json());
        }

        function sendPage() {
            const msg = document.getElementById('page-msg').value.trim();
            if (!msg) return;
            fetch('/api/page', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message: msg})})
                .then(r => r.json())
                .then(d => {
                    const el = document.getElementById('page-result');
                    el.textContent = `Sent: ${d.sent}`;
                    setTimeout(() => el.textContent = '', 3000);
                });
        }

        setInterval(() => fetch('/api/status').then(r => r.json()).then(updateNetwork), 500);
        setInterval(() => fetch('/api/mfw').then(r => r.json()).then(updateMfw), 5000);
        setInterval(() => document.getElementById('mfw-log').src = '/api/mfw-log?' + Date.now(), 30000);

        fetch('/api/status').then(r => r.json()).then(updateNetwork);
        fetch('/api/mfw').then(r => r.json()).then(updateMfw);
    </script>
</body>
</html>

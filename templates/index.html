<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <!-- Login overlay -->
    <div id="login-overlay">
        <div class="login-box">
            <h2>Network Monitor</h2>
            <input id="login-pw" type="password" placeholder="Password" autocomplete="current-password" />
            <button onclick="doLogin()">Login</button>
            <p id="login-error"></p>
        </div>
    </div>

    <div class="container">
        <div class="header-row">
            <h1>Network Monitor</h1>
            <button class="logout-btn" onclick="doLogout()">Logout</button>
        </div>

        <!-- Network Status -->
        <section>
            <h2>Network Status</h2>
            <div id="status-container"><div class="status loading">Loading&hellip;</div></div>
        </section>

        <!-- Add Device -->
        <section>
            <h2>Devices</h2>
            <div class="panel">
                <input id="dev-name" type="text" placeholder="Device name" />
                <input id="dev-ip"   type="text" placeholder="IP address" />
                <button onclick="addDevice()">Add</button>
                <span id="dev-result"></span>
            </div>
        </section>

        <!-- MFW Status -->
        <section>
            <h2>MFW System</h2>
            <div id="mfw-status"><div class="status loading">Loading&hellip;</div></div>
        </section>

        <!-- Send Test Page -->
        <section>
            <h2>Send Test Page</h2>
            <div class="panel">
                <input id="page-msg" type="text" placeholder="Message (e.g. Router Offline)" />
                <button onclick="sendPage()">Send to MFW</button>
                <span id="page-result"></span>
            </div>
        </section>

        <!-- MFW Alarm Log -->
        <section>
            <h2>MFW Alarm Log</h2>
            <iframe id="mfw-log" src="/api/mfw-log" title="MFW Log"></iframe>
        </section>
    </div>

    <script>
        // Escape user-controlled strings before inserting into HTML
        function esc(s) {
            return String(s)
                .replace(/&/g,'&amp;').replace(/</g,'&lt;')
                .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        // --- Auth ---
        function doLogin() {
            const pw = document.getElementById('login-pw').value;
            fetch('/login', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({password: pw})})
                .then(r => r.json())
                .then(d => {
                    if (d.ok) {
                        document.getElementById('login-overlay').style.display = 'none';
                    } else {
                        document.getElementById('login-error').textContent = 'Wrong password';
                    }
                });
        }

        document.getElementById('login-pw').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        function doLogout() {
            fetch('/logout', {method:'POST'}).then(() => {
                document.getElementById('login-overlay').style.display = 'flex';
                document.getElementById('login-pw').value = '';
                document.getElementById('login-error').textContent = '';
            });
        }

        fetch('/api/auth').then(r => r.json()).then(d => {
            if (d.authed) document.getElementById('login-overlay').style.display = 'none';
        });

        // --- Network status ---
        function updateNetwork(data) {
            const relay = `<div class="status ${data.output_status ? 'online' : 'offline'}">Relay: ${data.output_status ? 'ON' : 'OFF'}</div>`;
            const container = document.createElement('div');
            container.id = 'ip-list';

            Object.entries(data.device_list).forEach(([name, d]) => {
                const cls   = d.status === true ? 'ip-online' : d.status === false ? 'ip-offline' : 'ip-checking';
                const label = d.status === true ? 'Online'    : d.status === false ? 'Offline'    : 'Checking';

                const row = document.createElement('div');
                row.className = `ip-item ${cls}`;

                const strong = document.createElement('strong');
                strong.textContent = name;

                const badge = document.createElement('span');
                badge.className = 'status-indicator';
                badge.textContent = label;

                const btn = document.createElement('button');
                btn.className = 'remove-btn';
                btn.textContent = '✕';
                btn.dataset.name = name;
                btn.addEventListener('click', () => removeDevice(btn.dataset.name));

                row.appendChild(strong);
                row.appendChild(badge);

                if (d.last_online) {
                    const last = document.createElement('span');
                    last.className = 'last-online';
                    last.textContent = `Last online: ${d.last_online}`;
                    row.appendChild(last);
                }

                row.appendChild(btn);
                container.appendChild(row);
            });

            const sc = document.getElementById('status-container');
            sc.innerHTML = relay;
            sc.appendChild(container);
        }

        function updateMfw(data) {
            document.getElementById('mfw-status').innerHTML = data.mfra_running
                ? '<div class="status online">MFRA Running</div>'
                : '<div class="status offline">MFRA Stopped</div>';
        }

        // --- Device management ---
        function addDevice() {
            const name = document.getElementById('dev-name').value.trim();
            const ip   = document.getElementById('dev-ip').value.trim();
            if (!name || !ip) return;
            fetch('/api/devices', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({name, ip})})
                .then(r => r.json())
                .then(d => {
                    const el = document.getElementById('dev-result');
                    el.textContent = d.error || `Added: ${d.added}`;
                    if (!d.error) {
                        document.getElementById('dev-name').value = '';
                        document.getElementById('dev-ip').value   = '';
                    }
                    setTimeout(() => el.textContent = '', 4000);
                });
        }

        function removeDevice(name) {
            fetch('/api/devices/' + encodeURIComponent(name), {method:'DELETE'})
                .then(r => r.json());
        }

        // --- Send page ---
        function sendPage() {
            const msg = document.getElementById('page-msg').value.trim();
            if (!msg) return;
            fetch('/api/page', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({message: msg})})
                .then(r => r.json())
                .then(d => {
                    const el = document.getElementById('page-result');
                    el.textContent = d.error ? d.error : `Sent: ${esc(d.sent)}`;
                    setTimeout(() => el.textContent = '', 3000);
                });
        }

        // --- Log scroll ---
        function scrollLogToBottom() {
            const f = document.getElementById('mfw-log');
            try { f.contentWindow.scrollTo(0, f.contentDocument.body.scrollHeight); } catch(e) {}
        }
        document.getElementById('mfw-log').onload = scrollLogToBottom;

        // --- Polling ---
        setInterval(() => fetch('/api/status').then(r => r.json()).then(updateNetwork), 500);
        setInterval(() => fetch('/api/mfw').then(r => r.json()).then(updateMfw), 5000);
        setInterval(() => document.getElementById('mfw-log').src = '/api/mfw-log?' + Date.now(), 5000);

        fetch('/api/status').then(r => r.json()).then(updateNetwork);
        fetch('/api/mfw').then(r => r.json()).then(updateMfw);
    </script>
</body>
</html>
